<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Block Breaker (Keyboard版)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background-color: #eee;
            display: block;
            border-radius: 4px;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #startScreen, #gameOverScreen {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            pointer-events: auto;
        }

        h1 { margin-top: 0; font-size: 40px; color: #ffcc00; }
        p { font-size: 18px; line-height: 1.6; margin: 5px 0;}
        .key {
            display: inline-block;
            background: #444;
            padding: 2px 8px;
            border-radius: 4px;
            border-bottom: 2px solid #222;
            font-family: monospace;
            font-weight: bold;
            color: #fff;
        }

        button {
            background-color: #0095DD;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        button:hover { background-color: #0077b3; }
        
        .hidden { display: none !important; }
        
        #scoreBoard {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="myCanvas" width="800" height="600"></canvas>
    
    <!-- スコア表示 -->
    <div id="scoreBoard">Score: 0 | Lives: 3</div>

    <!-- UIオーバーレイ -->
    <div class="ui-layer">
        <!-- スタート画面 -->
        <div id="startScreen">
            <h1>Block Breaker</h1>
            <p>キーボードの操作でパドルを動かします。</p>
            <p>移動: <span class="key">←</span> <span class="key">→</span> または <span class="key">A</span> <span class="key">D</span></p>
            <p>すべてのブロックを倒したら勝利です！</p>
            <button id="startBtn">ゲームを始める</button>
        </div>

        <!-- ゲームオーバー/クリア画面 -->
        <div id="gameOverScreen" class="hidden">
            <h1 id="resultTitle">Game Over</h1>
            <p id="resultMessage">あなたのスコア: 0</p>
            <button id="restartBtn">もう一度遊ぶ</button>
        </div>
    </div>
</div>
<script src="BlockAI_Qwen_2026_process.js"></script>

</body>
</html>
